esphome:
  name: airquality01
  friendly_name: AirQuality01
  min_version: 2024.6.0
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio
  project:
    name: esphome.web
    version: dev
  includes:
    #- winsen_ze08.h #This header file does not exist? Nor does it seem to be needed to function.

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

psram:
  mode: quad

logger:
  level: DEBUG

time:
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - lvgl.label.update:
            id: lbl_datetime
            text: !lambda |-
              char buf[22];
              auto t = id(esptime).now();
              snprintf(buf, sizeof(buf), "%02d/%02d/%04d %02d:%02d",
                t.day_of_month, t.month, t.year, t.hour, t.minute);
              return std::string(buf);
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: lbl_datetime
              text: !lambda |-
                char buf[22];
                auto t = id(esptime).now();
                snprintf(buf, sizeof(buf), "%02d/%02d/%04d %02d:%02d",
                  t.day_of_month, t.month, t.year, t.hour, t.minute);
                return std::string(buf);

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Airquality01 Fallback Hotspot"
    password: !secret wifi_password

captive_portal:

dashboard_import:
  package_import_url: github://esphome/firmware/esphome-web/esp32s2.yaml@main
  import_full_config: true

web_server:

debug:
  update_interval: 5s


# ── PM Display Mode Switch ───────────────────────────────────────────────────
# Exposed to Home Assistant — allows toggling between cumulative and differential
# PM display mode. Can also be toggled by tapping the PARTICLES heading on-screen.
switch:
  - platform: template
    name: "PM Differential Mode"
    id: sw_pm_diff
    icon: "mdi:chart-bar-stacked"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: "return id(pm_diff_mode);"
    turn_on_action:
      - lambda: |-
          id(pm_diff_mode) = true;
          id(lv_pm25_val) = (int)clamp(max(0.0f, id(raw_pm25) - id(raw_pm1)),  0.0f, 30.0f);
          id(lv_pm10_val) = (int)clamp(max(0.0f, id(raw_pm10) - id(raw_pm25)), 0.0f, 100.0f);
      - lvgl.label.update:
          id: lbl_particles_mode
          text: "PARTICLES DIFF  µg/m³"
      - lvgl.label.update:
          id: lbl_pm25_name
          text: "PM1-2.5"
      - lvgl.label.update:
          id: lbl_pm10_name
          text: "PM2.5-10"
      - lvgl.arc.update:
          id: arc_pm25
          value: !lambda "return id(lv_pm25_val);"
      - lvgl.label.update:
          id: lbl_pm25
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm25_val)); return buf;
      - lvgl.arc.update:
          id: arc_pm10
          value: !lambda "return id(lv_pm10_val);"
      - lvgl.label.update:
          id: lbl_pm10
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm10_val)); return buf;
    turn_off_action:
      - lambda: |-
          id(pm_diff_mode) = false;
          id(lv_pm25_val) = (int)clamp(id(raw_pm25), 0.0f, 30.0f);
          id(lv_pm10_val) = (int)clamp(id(raw_pm10), 0.0f, 100.0f);
      - lvgl.label.update:
          id: lbl_particles_mode
          text: "PARTICLES CUMUL  µg/m³"
      - lvgl.label.update:
          id: lbl_pm25_name
          text: "PM2.5"
      - lvgl.label.update:
          id: lbl_pm10_name
          text: "PM10"
      - lvgl.arc.update:
          id: arc_pm25
          value: !lambda "return id(lv_pm25_val);"
      - lvgl.label.update:
          id: lbl_pm25
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm25_val)); return buf;
      - lvgl.arc.update:
          id: arc_pm10
          value: !lambda "return id(lv_pm10_val);"
      - lvgl.label.update:
          id: lbl_pm10
          text: !lambda |-
            char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm10_val)); return buf;

# ── Backlight dimming ────────────────────────────────────────────────────────
globals:
  - id: dbright
    type: int
    restore_value: no
    initial_value: '0'

  # PM display mode: 0 = cumulative (default), 1 = differential
  - id: pm_diff_mode
    type: bool
    restore_value: no
    initial_value: 'false'

  # Last known raw PM values — needed to recalculate on mode toggle
  - id: raw_pm1
    type: float
    restore_value: no
    initial_value: '0'
  - id: raw_pm25
    type: float
    restore_value: no
    initial_value: '0'
  - id: raw_pm10
    type: float
    restore_value: no
    initial_value: '0'

  # Cached display values for PM arcs — used by click handler to refresh display
  - id: lv_pm1_val
    type: int
    restore_value: no
    initial_value: '0'
  - id: lv_pm25_val
    type: int
    restore_value: no
    initial_value: '0'
  - id: lv_pm10_val
    type: int
    restore_value: no
    initial_value: '0'

output:
  - platform: ledc
    pin: GPIO15
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO13
      mode:
        input: true
        pullup: true
      inverted: true
    id: top_btn
    filters:
      - delayed_on: 10ms
      - delayed_off: 500ms
    on_press:
      then:
        - lambda: |-
            switch(id(dbright)){
            case 0: id(dbright) = 3; id(back_light).turn_on().set_brightness(1.00).perform(); return;
            case 1: id(dbright) = 0; id(back_light).turn_off().perform();                     return;
            case 2: id(dbright) = 1; id(back_light).turn_on().set_brightness(0.05).perform(); return;
            case 3: id(dbright) = 2; id(back_light).turn_on().set_brightness(0.33).perform(); return;
            }
# ── /Backlight dimming ───────────────────────────────────────────────────────


# ── Fonts ────────────────────────────────────────────
# All three fonts include µ and ³ explicitly — these are not in the default
# Roboto glyph set but are needed for the "µg/m³" particle concentration label.
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 11
    bpp: 4
    glyphs: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ .,:/°%µ³()-_"
  - file: "gfonts://Roboto"
    id: font_value
    size: 18
    bpp: 4
    glyphs: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ .,:/°%µ³()-_"
  - file: "gfonts://Roboto@500"
    id: font_heading
    size: 13
    bpp: 4
    glyphs: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ .,:/°%µ³()-_"


# ── LVGL ─────────────────────────────────────────────────────────────────────
#   Updated ranges here as needed. May not be 100% accurate
#   Layout (240 × 320) — based on confirmed connected sensors from boot log:
#
#   CONNECTED:  AHT20, BMP280, SCD40, SGP30, PMSX003, ZE08-CH2O
#   FAILED:     SHT40, ENS160, AHT20/ENS160 (i2c_2), SGP4x
#
#   y=  0.. 38  Header: Temp / Hum / QNH / Dew / Datetime
#   y= 39        Divider
#   y= 40..134  Particles  (3 arcs: PM1  PM2.5  PM10)
#   y=135        Divider
#   y=136..225  CO2        (1 large arc: SCD40, + hidden ENS160 arc)
#   y=226        Divider
#   y=227..315  VOC        (2 arcs: SGP30  ZE08, + hidden ENS160 TVOC arc)
#   y=316-320   Unused space
#   All widgets start hidden: true and reveal on first sensor on_value.
#   Adding a sensor later automatically reveals its arc — no code changes needed.
#   SGP41 section hidden — overlaps VOC area, reveals if SGP4x ever connected.

lvgl:
  displays:
    - main_display
  bg_color: 0x000000
  text_color: 0xFFFFFF

  widgets:

    # ── HEADER ───────────────────────────────────────────────────────────────
    - obj:
        x: 0
        y: 0
        width: 240
        height: 39
        bg_color: 0x000000
        border_width: 0
        pad_all: 0
        widgets:
          - label:
              x: 4
              y: 2
              text: "TEMP"
              text_font: font_small
              text_color: 0x666666

          - label:
              id: lbl_temp
              x: 4
              y: 13
              text: "--°C"
              text_font: font_value
              text_color: 0xCCCCCC
              hidden: true

          - label:
              x: 64
              y: 2
              text: "HUM"
              text_font: font_small
              text_color: 0x666666

          - label:
              id: lbl_hum
              x: 64
              y: 13
              text: "--%"
              text_font: font_value
              text_color: 0xCCCCCC
              hidden: true

          - label:
              x: 124
              y: 2
              text: "QNH"
              text_font: font_small
              text_color: 0x666666

          - label:
              id: lbl_qnh
              x: 124
              y: 13
              text: "----"
              text_font: font_value
              text_color: 0xCCCCCC
              hidden: true

          - label:
              x: 184
              y: 2
              text: "DEW"
              text_font: font_small
              text_color: 0x666666

          - label:
              id: lbl_dewpoint
              x: 184
              y: 13
              text: "--°C"
              text_font: font_value
              text_color: 0xCCCCCC
              hidden: true

          - label:
              id: lbl_datetime
              x: 4
              y: 28
              text: "--/--/---- --:--"
              text_font: font_small
              text_color: 0x444444

    # ── DIVIDER ──────────────────────────────────────────────────────────────
    - line:
        x: 0
        y: 39
        points:
          - 0, 0
          - 240, 0
        line_color: 0x333333
        line_width: 1

    # ── PARTICLES SECTION ────────────────────────────────────────────────────
    - obj:
        id: section_particles
        x: 0
        y: 40
        width: 240
        height: 95
        bg_color: 0x000000
        border_width: 0
        pad_all: 0
        hidden: true
        widgets:
          - label:
              id: lbl_particles_mode
              x: 4
              y: 2
              text: "PARTICLES CUMUL  µg/m³"
              text_font: font_heading
              text_color: 0x666666
              clickable: true
              on_click:
                then:
                  - lambda: |-
                      id(pm_diff_mode) = !id(pm_diff_mode);
                      float pm1  = id(raw_pm1);
                      float pm25 = id(raw_pm25);
                      float pm10 = id(raw_pm10);
                      float v1, v25, v10;
                      if (id(pm_diff_mode)) {
                        v1  = pm1;
                        v25 = max(0.0f, pm25 - pm1);
                        v10 = max(0.0f, pm10 - pm25);
                      } else {
                        v1  = pm1;
                        v25 = pm25;
                        v10 = pm10;
                      }
                      id(lv_pm1_val)  = (int)clamp(v1,  0.0f, 30.0f);
                      id(lv_pm25_val) = (int)clamp(v25, 0.0f, 30.0f);
                      id(lv_pm10_val) = (int)clamp(v10, 0.0f, 100.0f);
                  - lvgl.label.update:
                      id: lbl_particles_mode
                      text: !lambda |-
                        return std::string(id(pm_diff_mode) ? "PARTICLES DIFF  µg/m³" : "PARTICLES CUMUL  µg/m³");
                  - lvgl.arc.update:
                      id: arc_pm1
                      value: !lambda "return id(lv_pm1_val);"
                  - lvgl.label.update:
                      id: lbl_pm1
                      text: !lambda |-
                        char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm1_val)); return buf;
                  - lvgl.arc.update:
                      id: arc_pm25
                      value: !lambda "return id(lv_pm25_val);"
                  - lvgl.label.update:
                      id: lbl_pm25
                      text: !lambda |-
                        char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm25_val)); return buf;
                  - lvgl.arc.update:
                      id: arc_pm10
                      value: !lambda "return id(lv_pm10_val);"
                  - lvgl.label.update:
                      id: lbl_pm10
                      text: !lambda |-
                        char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm10_val)); return buf;
                  - lvgl.label.update:
                      id: lbl_pm1_name
                      text: "PM1"
                  - lvgl.label.update:
                      id: lbl_pm25_name
                      text: !lambda |-
                        return std::string(id(pm_diff_mode) ? "PM1-2.5" : "PM2.5");
                  - lvgl.label.update:
                      id: lbl_pm10_name
                      text: !lambda |-
                        return std::string(id(pm_diff_mode) ? "PM2.5-10" : "PM10");

          - obj:
              x: 0
              y: 23 #Previous value '16'
              width: 240
              height: 72 #Previosu value '72'
              bg_color: 0x000000
              border_width: 0
              pad_all: 0
              layout:
                type: flex
                flex_flow: ROW
                flex_align_main: CENTER
                flex_align_cross: CENTER
              widgets:
                - arc:
                    id: arc_pm1
                    width: 72
                    height: 72
                    min_value: 0
                    max_value: 30
                    value: 0
                    start_angle: 150
                    end_angle: 30
                    arc_width: 7
                    arc_color: 0x2a2a2a
                    indicator:
                      arc_width: 7
                      arc_color: 0xFFFFFF
                      arc_rounded: true
                    adjustable: false
                    widgets:
                      - label:
                          id: lbl_pm1
                          align: CENTER
                          y: -3 #Previous value '-5'
                          text: "--"
                          text_font: font_value
                          text_color: 0xFFFFFF
                      - label:
                          id: lbl_pm1_name
                          align: BOTTOM_MID
                          y: -4 #Previous value '2'
                          text: "PM1"
                          text_font: font_small
                          text_color: 0x666666

                - arc:
                    id: arc_pm25
                    width: 72
                    height: 72
                    min_value: 0
                    max_value: 30
                    value: 0
                    start_angle: 150
                    end_angle: 30
                    arc_width: 7
                    arc_color: 0x2a2a2a
                    indicator:
                      arc_width: 7
                      arc_color: 0xFFFFFF
                      arc_rounded: true
                    adjustable: false
                    widgets:
                      - label:
                          id: lbl_pm25
                          align: CENTER
                          y: -3 #Previous value '-5'
                          text: "--"
                          text_font: font_value
                          text_color: 0xFFFFFF
                      - label:
                          id: lbl_pm25_name
                          align: BOTTOM_MID
                          y: -4 #Previous value '2'
                          text: "PM2.5"
                          text_font: font_small
                          text_color: 0x666666

                - arc:
                    id: arc_pm10
                    width: 72
                    height: 72
                    min_value: 0
                    max_value: 100
                    value: 0
                    start_angle: 150
                    end_angle: 30
                    arc_width: 7
                    arc_color: 0x2a2a2a
                    indicator:
                      arc_width: 7
                      arc_color: 0xFFFFFF
                      arc_rounded: true
                    adjustable: false
                    widgets:
                      - label:
                          id: lbl_pm10
                          align: CENTER
                          y: -3 #Previous value '-5'
                          text: "--"
                          text_font: font_value
                          text_color: 0xFFFFFF
                      - label:
                          id: lbl_pm10_name
                          align: BOTTOM_MID
                          y: -4 #Previous value '2'
                          text: "PM10"
                          text_font: font_small
                          text_color: 0x666666

    # ── DIVIDER ──────────────────────────────────────────────────────────────
    - line:
        x: 0
        y: 135
        points:
          - 0, 0
          - 240, 0
        line_color: 0x333333
        line_width: 1

    # ── CO2 SECTION ──────────────────────────────────────────────────────────
    # SCD40 arc is large and centred when alone.
