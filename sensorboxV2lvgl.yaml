              text_font: font_small
              text_color: 0xFFFFFF


# ── Display ──────────────────────────────────────────────────────────────────
display:
  - platform: mipi_spi
    id: main_display
    model: ILI9341
    cs_pin: GPIO03
    dc_pin: GPIO04
    reset_pin: GPIO06
    data_rate: 40MHz
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: true
    color_order: bgr
    invert_colors: false
    dimensions: 240x320
    auto_clear_enabled: false
    update_interval: never


# ── UARTs ────────────────────────────────────────────────────────────────────
uart:
  - tx_pin: GPIO10
    rx_pin: GPIO09
    baud_rate: 9600
    id: uart_ze08
    parity: none
    data_bits: 8
    stop_bits: 1
    debug:
      direction: RX
      dummy_receiver: true
      after:
        bytes: 9
      sequence:
        - lambda: |-
            UARTDebug::log_hex(direction, bytes, ',');
            if (bytes.size() == 9 && bytes[0] == 0xFF && bytes[1] == 0x17) {
              float value = float((bytes[4] << 8) | bytes[5]);
              id(ch2o_ze08).publish_state(value);
            }

  - tx_pin: GPIO08
    rx_pin: GPIO07
    baud_rate: 9600
    id: uart_pms


# ── SPI ──────────────────────────────────────────────────────────────────────
spi:
  clk_pin: GPIO01
  mosi_pin: GPIO02
  miso_pin: GPIO16


# ── I2C ──────────────────────────────────────────────────────────────────────
i2c:
  - sda: GPIO11
    scl: GPIO12
    scan: true
    id: i2c_main

  - sda: GPIO17
    scl: GPIO18
    scan: true
    id: i2c_2


# ── Sensors ──────────────────────────────────────────────────────────────────

sensor:

  # ZE08 CH2O — published via UART debug lambda (active mode)
  - platform: template
    name: "ZE08 CH2O"
    unit_of_measurement: ppb
    state_class: measurement
    device_class: volatile_organic_compounds
    id: ch2o_ze08
    filters:
      - filter_out: 0.0
      - exponential_moving_average:
          send_every: 1
          alpha: 0.5
    on_value:
      then:
        - lvgl.widget.update:
            id: section_voc
            hidden: false
        - lvgl.arc.update:
            id: arc_ch2o
            value: !lambda "return (int)clamp(x, 0.0f, 200.0f);"
        - lvgl.label.update:
            id: lbl_ch2o
            text: !lambda |-
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
        - lvgl.widget.update:
            id: arc_ch2o
            indicator:
              arc_color: !lambda |-
                if (x > 100) return lv_color_hex(0xFF1616);   // WHO indoor limit
                if (x > 50)  return lv_color_hex(0xFF9900); // Conservative warning
                return lv_color_hex(0x00C800);

  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 5s
    disabled_by_default: True

  - platform: debug
    free:
      name: "Heap Free"
      id: heap_free
      disabled_by_default: True
    loop_time:
      name: "Loop Time"
      id: loop_time
      disabled_by_default: True

  # AHT20 — primary temp/humidity
  - platform: aht10
    i2c_id: i2c_main
    variant: AHT20
    temperature:
      name: "AHT20 Temperature"
      id: temp_aht20
      on_value:
        then:
          - lvgl.widget.update:
              id: lbl_temp
              hidden: false
          - lvgl.label.update:
              id: lbl_temp
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f°C", x); return buf;
          - lvgl.label.update:
              id: lbl_temp
              text_color: !lambda |-
                if (x > 30 || x < 16) return lv_color_hex(0xFF1616); // Too hot / too cold
                if (x > 26 || x < 19) return lv_color_hex(0xFF9900); // Warm / cool
                return lv_color_hex(0x00C800);                        // ASHRAE 55 comfort zone
    humidity:
      name: "AHT20 Humidity"
      id: hum_aht20
      on_value:
        then:
          - lvgl.widget.update:
              id: lbl_hum
              hidden: false
          - lvgl.label.update:
              id: lbl_hum
              text: !lambda |-
                char buf[6]; snprintf(buf, sizeof(buf), "%.0f%%", x); return buf;
          - lvgl.label.update:
              id: lbl_hum
              text_color: !lambda |-
                if (x > 65 || x < 30) return lv_color_hex(0xFF1616); // Mould risk / too dry
                if (x > 60 || x < 40) return lv_color_hex(0xFF9900); // Acceptable but not ideal
                return lv_color_hex(0x00C800);                        // ASHRAE / CIBSE optimal
    update_interval: 5s

  # Dewpoint — calculated from AHT20 temp + humidity using Magnus approximation
  # Td ≈ T - ((100 - RH) / 5)  accurate to ±0.35°C for typical indoor ranges
  # Thresholds: <10°C dry (amber), 10-16°C comfortable (green), >16°C humid (amber), >21°C muggy (red)
  - platform: template
    name: "Dewpoint"
    id: dewpoint
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      if (!id(temp_aht20).has_state() || !id(hum_aht20).has_state()) return NAN;
      float T  = id(temp_aht20).state;
      float RH = id(hum_aht20).state;
      return T - ((100.0f - RH) / 5.0f);
    on_value:
      then:
        - lvgl.widget.update:
            id: lbl_dewpoint
            hidden: false
        - lvgl.label.update:
            id: lbl_dewpoint
            text: !lambda |-
              char buf[8]; snprintf(buf, sizeof(buf), "%.0f°C", x); return buf;
        - lvgl.label.update:
            id: lbl_dewpoint
            text_color: !lambda |-
              if (x > 21) return lv_color_hex(0xFF1616); // Muggy — uncomfortably humid
              if (x > 16) return lv_color_hex(0xFF9900); // Humid — getting uncomfortable
              if (x < 10) return lv_color_hex(0xFF9900); // Dry — low humidity
              return lv_color_hex(0x00C800);              // 10-16°C comfortable indoor range

  # BMP280 — pressure with QNH correction for 120m altitude
  - platform: bmp280_i2c
    address: 0x77
    i2c_id: i2c_main
    temperature:
      name: "BMP280 Temperature"
      id: temp_bmp280
      oversampling: 16x
    pressure:
      name: "BMP280 Pressure (QNH)"
      id: pres_bmp280
      filters:
        - lambda: return x / pow(1.0 - (21.0 / 44330.0), 5.255); #Adjust elevation here as needed.
      on_value:
        then:
          - lvgl.widget.update:
              id: lbl_qnh
              hidden: false
          - lvgl.label.update:
              id: lbl_qnh
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
          - lvgl.label.update:
              id: lbl_qnh
              text_color: !lambda |-
                if (x < 980) return lv_color_hex(0xFF1616); // Storm / severe weather
                if (x < 1000) return lv_color_hex(0xFF9900); // Low pressure, unsettled
                if (x > 1030) return lv_color_hex(0xFF9900); // Very high pressure, very dry
                return lv_color_hex(0x00C800);               // Normal range
    iir_filter: 16x
    update_interval: 5s

  # SHT40 — currently not connected, hidden until it is
  - platform: sht4x
    i2c_id: i2c_main
    temperature:
      name: "SHT40 Temperature"
      id: temp_sht40
      on_value:
        then:
          - lvgl.widget.update:
              id: lbl_temp
              hidden: false
          - lvgl.label.update:
              id: lbl_temp
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f°C", x); return buf;
          - lvgl.label.update:
              id: lbl_temp
              text_color: !lambda |-
                if (x > 30 || x < 16) return lv_color_hex(0xFF1616);
                if (x > 26 || x < 19) return lv_color_hex(0xFF9900);
                return lv_color_hex(0x00C800);
    humidity:
      name: "SHT40 Relative Humidity"
      id: hum_sht40
      on_value:
        then:
          - lvgl.widget.update:
              id: lbl_hum
              hidden: false
          - lvgl.label.update:
              id: lbl_hum
              text: !lambda |-
                char buf[6]; snprintf(buf, sizeof(buf), "%.0f%%", x); return buf;
          - lvgl.label.update:
              id: lbl_hum
              text_color: !lambda |-
                if (x > 65 || x < 30) return lv_color_hex(0xFF1616);
                if (x > 60 || x < 40) return lv_color_hex(0xFF9900);
                return lv_color_hex(0x00C800);
    update_interval: 10s

  # SCD40 — real CO2
  - platform: scd4x
    i2c_id: i2c_main
    co2:
      name: "SCD40 CO2"
      id: co2_scd40
      on_value:
        then:
          - lvgl.widget.update:
              id: section_co2
              hidden: false
          - lvgl.arc.update:
              id: arc_co2
              value: !lambda "return (int)clamp(x, 400.0f, 2000.0f);"
          - lvgl.label.update:
              id: lbl_co2
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
          - lvgl.widget.update:
              id: arc_co2
              indicator:
                arc_color: !lambda |-
                  if (x > 1200) return lv_color_hex(0xFF1616);   // Poor air quality, cognitive effects
                  if (x > 800)  return lv_color_hex(0xFF9900); // Stuffy, ventilation needed
                  return lv_color_hex(0x00C800);
    temperature:
      name: "SCD40 Temperature"
      id: temp_scd40
    humidity:
      name: "SCD40 Humidity"
      id: hum_scd40
    update_interval: 10s

  # ENS160 — currently not connected; arcs hidden until it is
  - platform: ens160_i2c
    address: 0x53
    i2c_id: i2c_2
    eco2:
      name: "ENS160 eCO2"
      id: eco2_ens160
      on_value:
        then:
          - lvgl.widget.update:
              id: section_co2
              hidden: false
          - lvgl.widget.update:
              id: arc_eco2
              hidden: false
          - lvgl.arc.update:
              id: arc_eco2
              value: !lambda "return (int)clamp(x, 400.0f, 2000.0f);"
          - lvgl.label.update:
              id: lbl_eco2
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
          - lvgl.widget.update:
              id: arc_eco2
              indicator:
                arc_color: !lambda |-
                  if (x > 1200) return lv_color_hex(0xFF1616);   // Poor air quality, cognitive effects
                  if (x > 800)  return lv_color_hex(0xFF9900); // Stuffy, ventilation needed
                  return lv_color_hex(0x00C800);
    tvoc:
      name: "ENS160 TVOC"
      id: tvoc_ens160
      on_value:
        then:
          - lvgl.widget.update:
              id: section_voc
              hidden: false
          - lvgl.widget.update:
              id: arc_ens_voc
              hidden: false
          - lvgl.arc.update:
              id: arc_ens_voc
              value: !lambda "return (int)clamp(x, 0.0f, 2000.0f);"
          - lvgl.label.update:
              id: lbl_ens_voc
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
          - lvgl.widget.update:
              id: arc_ens_voc
              indicator:
                arc_color: !lambda |-
                  if (x > 500) return lv_color_hex(0xFF1616);   // WELL Building Standard max
                  if (x > 300) return lv_color_hex(0xFF9900); // Investigate sources
                  return lv_color_hex(0x00C800);
      filters:
        - exponential_moving_average:
            send_every: 1
            alpha: 0.5
    aqi:
      name: "ENS160 Air Quality Index"
      id: aqi_ens160
    update_interval: 10s
    compensation:
      temperature: temp_aht20_ens
      humidity: hum_aht20_ens

  # AHT20 on i2c_2 (paired with ENS160) — currently not connected
  - platform: aht10
    i2c_id: i2c_2
    variant: AHT20
    temperature:
      name: "AHT20⁄ENS160 Temperature"
      id: temp_aht20_ens
      disabled_by_default: True
    humidity:
      name: "AHT20⁄ENS160 Humidity"
      id: hum_aht20_ens
      disabled_by_default: True
    update_interval: 10s

  # SGP30 — TVOC shown on display; eCO2 reported to HA only
  - platform: sgp30
    i2c_id: i2c_main
    address: 0x58
    eco2:
      name: "SGP30 eCO2"
      id: eco2_sgp30
      accuracy_decimals: 0
      filters:
        - exponential_moving_average:
            send_every: 1
            alpha: 0.2
    tvoc:
      name: "SGP30 TVOC"
      id: tvoc_sgp30
      accuracy_decimals: 1
      on_value:
        then:
          - lvgl.widget.update:
              id: section_voc
              hidden: false
          - lvgl.arc.update:
              id: arc_sgp30_voc
              value: !lambda "return (int)clamp(x, 0.0f, 1500.0f);"
          - lvgl.label.update:
              id: lbl_sgp30_voc
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
          - lvgl.widget.update:
              id: arc_sgp30_voc
              indicator:
                arc_color: !lambda |-
                  if (x > 500) return lv_color_hex(0xFF1616);   // WELL Building Standard max
                  if (x > 300) return lv_color_hex(0xFF9900); // Investigate sources
                  return lv_color_hex(0x00C800);
      filters:
        - exponential_moving_average:
            send_every: 1
            alpha: 0.2
    store_baseline: yes
    update_interval: 5s
    compensation:
      humidity_source: hum_aht20
      temperature_source: temp_aht20

  # SGP4x — currently not connected; reveals SGP41 index rows if added
  - platform: sgp4x
    i2c_id: i2c_main
    voc:
      name: "SGP41 VOC Index"
      id: aqi_voc_sgp41
      icon: "mdi:air-filter"
      device_class: aqi
      state_class: measurement
      unit_of_measurement: "index points"
      on_value:
        then:
          - lvgl.widget.update:
              id: section_sgp41
              hidden: false
          - lvgl.label.update:
              id: lbl_sgp41_voc
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
    nox:
      name: "SGP41 NOx Index"
      id: aqi_nox_sgp41
      icon: "mdi:air-filter"
      device_class: aqi
      state_class: measurement
      unit_of_measurement: "index points"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_sgp41_nox
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%.0f", x); return buf;
    compensation:
      humidity_source: hum_aht20
      temperature_source: temp_aht20
    store_baseline: True
    update_interval: 10s

  # PMSX003 particle sensor
  - platform: pmsx003
    type: PMSX003
    update_interval: 0s
    uart_id: uart_pms
    pm_1_0:
      name: "PMS Particulate Matter <1.0µm Concentration"
      id: pm1_pms
      on_value:
        then:
          - lambda: |-
              id(raw_pm1) = x;
              id(lv_pm1_val) = (int)clamp(x, 0.0f, 30.0f);
          - lvgl.widget.update:
              id: section_particles
              hidden: false
          - lvgl.arc.update:
              id: arc_pm1
              value: !lambda "return id(lv_pm1_val);"
          - lvgl.label.update:
              id: lbl_pm1
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm1_val)); return buf;
          - lvgl.widget.update:
              id: arc_pm1
              indicator:
                arc_color: !lambda |-
                  if (x > 25) return lv_color_hex(0xFF1616);   // WHO 2021 indoor guideline
                  if (x > 10) return lv_color_hex(0xFF9900); // Elevated, investigate
                  return lv_color_hex(0x00C800);
    pm_2_5:
      name: "PMS Particulate Matter <2.5µm Concentration"
      id: pm25_pms
      on_value:
        then:
          - lambda: |-
              id(raw_pm25) = x;
              float v = id(pm_diff_mode) ? max(0.0f, x - id(raw_pm1)) : x;
              id(lv_pm25_val) = (int)clamp(v, 0.0f, 30.0f);
          - lvgl.arc.update:
              id: arc_pm25
              value: !lambda "return id(lv_pm25_val);"
          - lvgl.label.update:
              id: lbl_pm25
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm25_val)); return buf;
          - lvgl.widget.update:
              id: arc_pm25
              indicator:
                arc_color: !lambda |-
                  float v = id(pm_diff_mode) ? max(0.0f, x - id(raw_pm1)) : x;
                  if (v > 25) return lv_color_hex(0xFF1616);
                  if (v > 10) return lv_color_hex(0xFF9900);
                  return lv_color_hex(0x00C800);
    pm_10_0:
      name: "PMS Particulate Matter <10.0µm Concentration"
      id: pm10_pms
      on_value:
        then:
          - lambda: |-
              id(raw_pm10) = x;
              float v = id(pm_diff_mode) ? max(0.0f, x - id(raw_pm25)) : x;
              id(lv_pm10_val) = (int)clamp(v, 0.0f, 100.0f);
          - lvgl.arc.update:
              id: arc_pm10
              value: !lambda "return id(lv_pm10_val);"
          - lvgl.label.update:
              id: lbl_pm10
              text: !lambda |-
                char buf[8]; snprintf(buf, sizeof(buf), "%d", id(lv_pm10_val)); return buf;
          - lvgl.widget.update:
              id: arc_pm10
              indicator:
                arc_color: !lambda |-
                  float v = id(pm_diff_mode) ? max(0.0f, x - id(raw_pm25)) : x;
                  if (v > 45) return lv_color_hex(0xFF1616);
                  if (v > 20) return lv_color_hex(0xFF9900);
                  return lv_color_hex(0x00C800);